<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo Web</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #0f172a, #2563eb);
            height: 100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .contenedor{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding:40px;
            border-radius:20px;
            text-align:center;
            color:white;
            width:80%;
            max-width:700px;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        h2{
            font-size:1.4rem;
            font-weight:normal;
            margin-bottom:20px;
        }

        h3{
            font-size:1.1rem;
            color:#dbeafe;
        }

        .linea{
            width:100px;
            height:4px;
            background:white;
            margin:20px auto;
            border-radius:10px;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Desarrollo Web</h1>

        <div class="linea"></div>

        <h2>
            Proyecto académico para el aprendizaje de tecnologías web,
            diseño de páginas y desarrollo de aplicaciones modernas.
        </h2>

        <h3>Desarrollado por Jonathan Zambrano</h3>
    </div>

</body>
</html>
